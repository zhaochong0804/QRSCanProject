<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>测算结果</title>
  <style>
    :root {
      color-scheme: light;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Microsoft YaHei", sans-serif;
      background: radial-gradient(circle at top, #fff4e7 0%, #ffedd6 42%, #fff8f0 100%);
      color: #1f2329;
    }

    .card {
      width: 100%;
      max-width: 420px;
      padding: 18px 12px 16px;
      text-align: center;
    }

    .icon-wrap {
      width: 84px;
      height: 84px;
      border-radius: 50%;
      margin: 0 auto 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff4e5;
      border: 2px solid #ffd7a1;
      box-shadow: 0 10px 26px rgba(239, 150, 26, 0.16);
    }

    .icon-wrap::before {
      content: "⚠";
      width: 52px;
      height: 52px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      font-weight: 700;
      color: #ffffff;
      background: linear-gradient(135deg, #f7a32d, #ef8f12);
    }

    h1 {
      margin: 0;
      font-size: 24px;
      color: #d17a0d;
      letter-spacing: 0.4px;
    }

    .desc {
      margin: 12px 0 0;
      color: #7b6a53;
      font-size: 14px;
      line-height: 1.7;
    }

    .actions {
      margin-top: 26px;
      display: grid;
      gap: 12px;
    }

    .btn {
      text-decoration: none;
      border-radius: 10px;
      font-size: 15px;
      padding: 12px 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .btn-primary {
      background: linear-gradient(135deg, #f7a32d, #ef8f12);
      color: #ffffff;
      box-shadow: 0 8px 18px rgba(239, 143, 18, 0.22);
    }
  </style>
</head>
<body>
  <main class="card" aria-label="审核失败页面">
    <div class="icon-wrap" aria-hidden="true"></div>
    <h1>失败</h1>
    <p class="desc">抱歉，您暂未获得个人信用贷款额度。</p>
    <div class="actions">
      <a class="btn btn-primary" href="./index.html?resetProfile=1">返回</a>
    </div>
  </main>
</body>
</html>
