<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>个人资料填写</title>
  <style>
    :root {
      color-scheme: light;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Microsoft YaHei", sans-serif;
      background: radial-gradient(circle at top, #eaf2ff 0%, #f5f8ff 40%, #f4f6fa 100%);
      color: #1f2329;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .phone-shell {
      width: 100%;
      max-width: 420px;
      border-radius: 20px;
      background: #ffffff;
      overflow: hidden;
      box-shadow: 0 18px 44px rgba(46, 76, 130, 0.18);
      border: 1px solid #e5ebf7;
    }

    .top-bar {
      padding: 14px 16px;
      font-size: 15px;
      font-weight: 600;
      color: #ffffff;
      background: linear-gradient(135deg, #1677ff, #125ad4);
    }

    .card {
      width: 100%;
      padding: 20px;
      background: #ffffff;
    }

    h1 {
      margin: 0;
      font-size: 21px;
      letter-spacing: 0.2px;
    }

    .status-line {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
      margin-bottom: 18px;
      color: #637083;
      font-size: 13px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ffb020;
      box-shadow: 0 0 0 4px rgba(255, 176, 32, 0.16);
    }

    .form-block {
      background: #f8faff;
      border: 1px solid #e3e9f7;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 14px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 600;
    }

    input,
    select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #d4d9e2;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      background: #ffffff;
    }

    input:focus,
    select:focus {
      border-color: #1677ff;
      box-shadow: 0 0 0 3px rgba(22, 119, 255, 0.12);
    }

    .field-gap {
      margin-top: 12px;
    }

    .face-box {
      margin-top: 12px;
      padding: 12px;
      border-radius: 10px;
      border: 1px dashed #c8d6f3;
      background: #f3f7ff;
    }

    .face-title {
      margin: 0;
      font-size: 14px;
      font-weight: 600;
      color: #294f9f;
    }

    .face-desc {
      margin: 8px 0 12px;
      font-size: 12px;
      color: #5a6780;
    }

    .face-status {
      margin-top: 10px;
      margin-bottom: 0;
      font-size: 12px;
      color: #4b5563;
      min-height: 16px;
    }

    .hint {
      margin-top: 6px;
      margin-bottom: 0;
      min-height: 16px;
      font-size: 12px;
      color: #6b7280;
    }

    .hint:empty {
      display: none;
    }

    .review-tip {
      margin: 10px 0 0;
      font-size: 12px;
      color: #6b7280;
      text-align: center;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 8px;
      background: #1677ff;
      color: #ffffff;
      padding: 12px 14px;
      font-size: 15px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 8px 18px rgba(22, 119, 255, 0.28);
      transition: transform 0.14s ease, box-shadow 0.14s ease, opacity 0.2s;
    }

    button:active:not(:disabled) {
      transform: translateY(1px);
      box-shadow: 0 6px 14px rgba(22, 119, 255, 0.26);
    }

    button:disabled {
      opacity: 0.8;
      cursor: not-allowed;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.4);
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
    }

    .loading .spinner {
      display: inline-block;
    }

    #toast {
      position: fixed;
      left: 50%;
      bottom: 36px;
      transform: translateX(-50%) translateY(20px);
      background: rgba(0, 0, 0, 0.8);
      color: #fff;
      font-size: 14px;
      padding: 10px 14px;
      border-radius: 8px;
      opacity: 0;
      pointer-events: none;
      transition: all 0.25s ease;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>
  <section class="phone-shell" aria-label="个人资料页面">
    <div class="top-bar">证件审核中心</div>
    <main class="card">
      <h1>个人资料填写</h1>
      <p class="status-line">
        <span class="status-dot" aria-hidden="true"></span>
        第二步：资料填写与人脸识别
      </p>
      <div class="form-block">
        <label for="educationInput">学历</label>
        <select id="educationInput">
          <option value="">请选择学历</option>
          <option>高中及以下</option>
          <option>大专</option>
          <option>本科</option>
          <option>硕士及以上</option>
        </select>

        <label class="field-gap" for="fundInput">公积金数</label>
        <input
          id="fundInput"
          type="text"
          inputmode="numeric"
          placeholder="请输入公积金数，例如 3000"
          maxlength="12"
        />
        <p class="hint" id="fundHint"></p>

        <label class="field-gap" for="companyNameInput">单位名称</label>
        <input
          id="companyNameInput"
          type="text"
          placeholder="请输入单位名称"
          maxlength="40"
        />

        <label class="field-gap" for="companyAddrInput">单位地址</label>
        <input
          id="companyAddrInput"
          type="text"
          placeholder="请输入单位地址"
          maxlength="80"
        />

        <div class="face-box">
          <p class="face-title">人脸识别</p>
          <p class="face-desc">点击开始识别后，将进入人脸识别页面完成动作校验。</p>
          <button id="startFaceBtn" type="button">开始识别</button>
          <p class="face-status" id="faceStatus">识别状态：未开始</p>
        </div>
      </div>

      <button id="submitBtn" type="button">
        <span class="spinner" aria-hidden="true"></span>
        <span id="btnText">提交审核</span>
      </button>
      <p id="reviewTip" class="review-tip">提交后将进入审核流程。</p>
    </main>
  </section>

  <div id="toast" role="status" aria-live="polite"></div>

  <script>
    const educationInput = document.getElementById("educationInput");
    const fundInput = document.getElementById("fundInput");
    const fundHint = document.getElementById("fundHint");
    const companyNameInput = document.getElementById("companyNameInput");
    const companyAddrInput = document.getElementById("companyAddrInput");
    const startFaceBtn = document.getElementById("startFaceBtn");
    const faceStatus = document.getElementById("faceStatus");
    const submitBtn = document.getElementById("submitBtn");
    const btnText = document.getElementById("btnText");
    const reviewTip = document.getElementById("reviewTip");
    const toast = document.getElementById("toast");
    const PROFILE_DRAFT_KEY = "profileDraft";

    let reviewTimer = null;
    let countdownTimer = null;
    let faceVerified = false;
    let reviewLocking = false;

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      window.setTimeout(() => {
        toast.classList.remove("show");
      }, 1600);
    }

    function setPageLocked(locked) {
      reviewLocking = locked;
      [educationInput, fundInput, companyNameInput, companyAddrInput, startFaceBtn].forEach((el) => {
        el.disabled = locked;
      });
      submitBtn.disabled = locked;
    }

    function syncFaceStatus() {
      faceVerified = sessionStorage.getItem("faceVerified") === "true";
      if (faceVerified) {
        faceStatus.textContent = "识别状态：识别通过";
        startFaceBtn.textContent = "重新识别";
      } else {
        faceStatus.textContent = "识别状态：未开始";
        startFaceBtn.textContent = "开始识别";
      }
    }

    function saveDraft() {
      const draft = {
        education: educationInput.value,
        fund: fundInput.value,
        companyName: companyNameInput.value,
        companyAddr: companyAddrInput.value,
      };
      sessionStorage.setItem(PROFILE_DRAFT_KEY, JSON.stringify(draft));
    }

    function restoreDraft() {
      const raw = sessionStorage.getItem(PROFILE_DRAFT_KEY);
      if (!raw) {
        return;
      }
      try {
        const draft = JSON.parse(raw);
        educationInput.value = draft.education || "";
        fundInput.value = draft.fund || "";
        companyNameInput.value = draft.companyName || "";
        companyAddrInput.value = draft.companyAddr || "";
      } catch (error) {
        sessionStorage.removeItem(PROFILE_DRAFT_KEY);
      }
    }

    [educationInput, fundInput, companyNameInput, companyAddrInput].forEach((el) => {
      el.addEventListener("input", saveDraft);
      el.addEventListener("change", saveDraft);
    });

    fundInput.addEventListener("input", () => {
      const raw = fundInput.value;
      const cleaned = raw.replace(/\D/g, "").slice(0, 12);
      fundInput.value = cleaned;
      fundHint.textContent = raw !== cleaned ? "仅支持输入数字，已自动过滤。" : "";
    });

    startFaceBtn.addEventListener("click", () => {
      if (reviewLocking) {
        return;
      }
      saveDraft();
      window.location.href = "face_verify.html";
    });

    submitBtn.addEventListener("click", () => {
      if (submitBtn.disabled) {
        return;
      }

      if (!educationInput.value) {
        showToast("请选择学历");
        return;
      }

      if (!fundInput.value.trim()) {
        showToast("请输入公积金数");
        return;
      }

      if (!/^\d+$/.test(fundInput.value.trim())) {
        showToast("公积金数仅支持数字");
        return;
      }

      if (!companyNameInput.value.trim()) {
        showToast("请输入单位名称");
        return;
      }

      if (!companyAddrInput.value.trim()) {
        showToast("请输入单位地址");
        return;
      }

      faceVerified = sessionStorage.getItem("faceVerified") === "true";
      if (!faceVerified) {
        showToast("请先完成人脸识别并通过");
        return;
      }

      setPageLocked(true);
      submitBtn.classList.add("loading");
      btnText.textContent = "审核中...";

      let remain = 60;
      reviewTip.textContent = `审核中，预计 ${remain} 秒后出结果...`;
      countdownTimer = window.setInterval(() => {
        remain -= 1;
        reviewTip.textContent = `审核中，预计 ${remain} 秒后出结果...`;
      }, 1000);

      reviewTimer = window.setTimeout(() => {
        window.location.href = "fail.html";
      }, 60000);
    });

    const params = new URLSearchParams(window.location.search);
    if (params.get("face") === "success") {
      showToast("人脸识别已完成");
      window.history.replaceState({}, "", "profile.html");
    }
    restoreDraft();
    syncFaceStatus();

    window.addEventListener("beforeunload", () => {
      if (reviewTimer) {
        window.clearTimeout(reviewTimer);
      }
      if (countdownTimer) {
        window.clearInterval(countdownTimer);
      }
    });
  </script>
</body>
</html>
