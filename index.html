<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>资质校验</title>
  <style>
    :root {
      color-scheme: light;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Microsoft YaHei", sans-serif;
      background: radial-gradient(circle at top, #eaf2ff 0%, #f5f8ff 40%, #f4f6fa 100%);
      color: #1f2329;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .phone-shell {
      width: 100%;
      max-width: 420px;
      border-radius: 20px;
      background: #ffffff;
      overflow: hidden;
      box-shadow: 0 18px 44px rgba(46, 76, 130, 0.18);
      border: 1px solid #e5ebf7;
    }

    .top-bar {
      padding: 14px 16px;
      font-size: 15px;
      font-weight: 600;
      color: #ffffff;
      background: linear-gradient(135deg, #1677ff, #125ad4);
    }

    .card {
      width: 100%;
      padding: 20px;
      background: #ffffff;
    }

    h1 {
      margin: 0;
      font-size: 21px;
      letter-spacing: 0.2px;
    }

    .status-line {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
      margin-bottom: 18px;
      color: #637083;
      font-size: 13px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ffb020;
      box-shadow: 0 0 0 4px rgba(255, 176, 32, 0.16);
    }

    .form-block {
      background: #f8faff;
      border: 1px solid #e3e9f7;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 14px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 600;
    }

    input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #d4d9e2;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      background: #ffffff;
    }

    input:focus {
      border-color: #1677ff;
      box-shadow: 0 0 0 3px rgba(22, 119, 255, 0.12);
    }

    .hint {
      margin-top: 8px;
      margin-bottom: 2px;
      font-size: 12px;
      color: #6b7280;
      min-height: 18px;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 8px;
      background: #1677ff;
      color: #ffffff;
      padding: 12px 14px;
      font-size: 15px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 8px 18px rgba(22, 119, 255, 0.28);
      transition: transform 0.14s ease, box-shadow 0.14s ease, opacity 0.2s;
    }

    button:active:not(:disabled) {
      transform: translateY(1px);
      box-shadow: 0 6px 14px rgba(22, 119, 255, 0.26);
    }

    button:disabled {
      opacity: 0.8;
      cursor: not-allowed;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.4);
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
    }

    .loading .spinner {
      display: inline-block;
    }

    #toast {
      position: fixed;
      left: 50%;
      bottom: 36px;
      transform: translateX(-50%) translateY(20px);
      background: rgba(0, 0, 0, 0.8);
      color: #fff;
      font-size: 14px;
      padding: 10px 14px;
      border-radius: 8px;
      opacity: 0;
      pointer-events: none;
      transition: all 0.25s ease;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>
  <section class="phone-shell" aria-label="审核页面">
    <div class="top-bar">证件审核中心</div>
    <main class="card">
      <h1>身份信息审核</h1>
      <p class="status-line">
        <span class="status-dot" aria-hidden="true"></span>
        当前状态：待提交
      </p>
      <div class="form-block">
        <label for="idInput">请输入身份证号</label>
        <input
          id="idInput"
          type="text"
          autocomplete="off"
          placeholder="仅支持数字和英文"
          maxlength="32"
        />
        <p class="hint" id="hint"></p>
      </div>
      <button id="submitBtn" type="button">
        <span class="spinner" aria-hidden="true"></span>
        <span id="btnText">提交审核</span>
      </button>
    </main>
  </section>

  <div id="toast" role="status" aria-live="polite">审核拒绝</div>

  <script>
    const idInput = document.getElementById("idInput");
    const hint = document.getElementById("hint");
    const submitBtn = document.getElementById("submitBtn");
    const btnText = document.getElementById("btnText");
    const toast = document.getElementById("toast");

    let timer = null;

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      window.setTimeout(() => {
        toast.classList.remove("show");
      }, 1600);
    }

    idInput.addEventListener("input", () => {
      const raw = idInput.value;
      const cleaned = raw.replace(/[^0-9a-zA-Z]/g, "");
      if (raw !== cleaned) {
        hint.textContent = "仅允许输入数字和英文，已自动过滤非法字符。";
      } else {
        hint.textContent = "";
      }
      idInput.value = cleaned;
    });

    submitBtn.addEventListener("click", () => {
      if (submitBtn.disabled) {
        return;
      }

      if (!idInput.value.trim()) {
        showToast("请输入身份证号");
        return;
      }

      submitBtn.disabled = true;
      submitBtn.classList.add("loading");
      btnText.textContent = "审核中...";

      timer = window.setTimeout(() => {
        submitBtn.disabled = false;
        submitBtn.classList.remove("loading");
        btnText.textContent = "提交审核";
        showToast("审核拒绝");
      }, 3000);
    });

    window.addEventListener("beforeunload", () => {
      if (timer) {
        window.clearTimeout(timer);
      }
    });
  </script>
</body>
</html>
