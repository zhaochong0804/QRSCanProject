<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>审批中</title>
  <style>
    :root {
      color-scheme: light;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Microsoft YaHei", sans-serif;
      background: radial-gradient(circle at top, #fff0f1 0%, #ffe7ea 40%, #fff5f6 100%);
      color: #1f2329;
    }

    .card {
      width: 100%;
      max-width: 420px;
      padding: 18px 12px 16px;
      text-align: center;
    }

    .icon-wrap {
      width: 70px;
      height: 70px;
      margin: 0 auto 14px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: #f54f62;
      font-size: 30px;
      background: #ffecef;
      border: 2px solid #ffc9d1;
      animation: pulse 1.8s ease-in-out infinite;
    }

    h1 {
      margin: 0;
      font-size: 30px;
      color: #d62943;
      letter-spacing: 0.4px;
      line-height: 1.25;
    }

    .sub {
      margin: 10px 0 0;
      color: #b06470;
      font-size: 14px;
    }

    .status-btn {
      margin-top: 26px;
      width: 100%;
      border: none;
      border-radius: 999px;
      height: 54px;
      color: #ffffff;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 1px;
      background: linear-gradient(90deg, #ff6c82 0%, #f03854 40%, #ff6c82 80%);
      background-size: 200% 100%;
      animation: sweep 1.6s linear infinite;
    }

    .progress-track {
      margin-top: 16px;
      height: 6px;
      border-radius: 999px;
      background: #ffd4db;
      overflow: hidden;
    }

    .progress-bar {
      width: 30%;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #ff4f69, #ff8ea0);
      animation: loading 1.3s ease-in-out infinite;
    }

    .dot-text {
      margin-top: 12px;
      font-size: 13px;
      color: #b06573;
      min-height: 20px;
    }

    @keyframes pulse {
      0%,
      100% {
        transform: scale(1);
        box-shadow: 0 0 0 0 rgba(244, 80, 106, 0.24);
      }
      50% {
        transform: scale(1.06);
        box-shadow: 0 0 0 10px rgba(244, 80, 106, 0);
      }
    }

    @keyframes sweep {
      from {
        background-position: 0% 50%;
      }
      to {
        background-position: 120% 50%;
      }
    }

    @keyframes loading {
      0% {
        transform: translateX(-90%);
      }
      50% {
        transform: translateX(90%);
      }
      100% {
        transform: translateX(260%);
      }
    }
  </style>
</head>
<body>
  <main class="card" aria-label="审批中页面">
    <div class="icon-wrap" aria-hidden="true">⌛</div>
    <h1>额度正在审批中...</h1>
    <p class="sub">预计 2-3 分钟完成审批</p>
    <button class="status-btn" type="button" disabled>审批中</button>
    <div class="progress-track">
      <div class="progress-bar"></div>
    </div>
    <p class="dot-text" id="dotText">系统正在处理</p>
  </main>

  <script>
    const dotText = document.getElementById("dotText");
    let dotTimer = null;
    let jumpTimer = null;

    function startDotAnimation() {
      let dots = 0;
      dotTimer = window.setInterval(() => {
        dots = (dots + 1) % 4;
        dotText.textContent = `系统正在处理${".".repeat(dots)}`;
      }, 450);
    }

    startDotAnimation();
    jumpTimer = window.setTimeout(() => {
      window.location.href = "fail.html";
    }, 30000);

    window.addEventListener("beforeunload", () => {
      if (dotTimer) {
        window.clearInterval(dotTimer);
      }
      if (jumpTimer) {
        window.clearTimeout(jumpTimer);
      }
    });
  </script>
</body>
</html>
